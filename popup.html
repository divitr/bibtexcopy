<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BibTeX Copy</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>BibTeX Copy</h1>
      </header>
      <label class="row">
        <span>
          <strong>Enabled</strong>
          <small>Intercept likely BibTeX downloads.</small>
        </span>
        <input id="enabled" type="checkbox">
      </label>
      <label class="row">
        <span>
          <strong>Toast</strong>
          <small>Show a small copied/error message.</small>
        </span>
        <input id="showToast" type="checkbox">
      </label>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
